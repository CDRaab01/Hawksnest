name: Android Release

# Build a SIGNED release APK using the committed "stable" key (android/app/hawksnest-debug.keystore),
# the SAME identity debug / android-ci / local builds use. This is deliberate: it gives one signing
# identity across every build so new APKs install as in-place UPDATES (no "package appears to be
# invalid" / INSTALL_FAILED_UPDATE_INCOMPATIBLE) and the saved HA token survives. build.gradle.kts
# documents this: that key "secures nothing on its own (this is a personal, sideloaded app); its only
# job is install continuity." We intentionally do NOT pass KEYSTORE_PATH, so the release buildType
# falls back to the stable signingConfig (see build.gradle.kts). The owner-held HAWKSNEST_KEYSTORE_*
# secrets are therefore no longer used — leaving them set is harmless.
#
# Triggers: the manual "Run workflow" button (once this file is on the default branch), and a push
# that changes this workflow or the `android/.release-trigger` sentinel. To cut a new build, bump
# `android/.release-trigger` and push.
on:
  workflow_dispatch:
  push:
    branches: ["claude/**", "main"]
    paths:
      - ".github/workflows/android-release.yml"
      - "android/.release-trigger"

jobs:
  release:
    name: "Android — Signed Release APK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4

      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Assemble signed release APK (committed stable key)
        # No KEYSTORE_PATH on purpose: build.gradle.kts only creates the CI "release"
        # signingConfig when KEYSTORE_PATH is set, otherwise the release buildType falls
        # back to the committed "stable" key — the shared install-continuity identity.
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "0.1.${{ github.run_number }}"
        run: ./gradlew :app:assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: hawksnest-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
