name: Android Release

# Automatic release. Any push to main that changes the Android app cuts a signed release APK,
# generates version.json, and publishes a GitHub Release — so shipping to devices is just pushing
# to main. Dragonfly (the suite hub) polls releases/latest and diffs versionCode.
#
# versionCode = epoch minutes: monotonic across workflow changes and always far above any prior
# run-number-based code (the old android-release runs shipped codes like 11), so a fresh release
# never looks like a downgrade. versionName = the app's major.minor from build.gradle + the commit
# count. Signs with the release keystore when the HAWKSNEST_KEYSTORE_* secrets are set; otherwise
# the committed stable key (build.gradle fallback).
#
# Tag scheme android-vX.Y.Z keeps these Android releases out of the way of any v* web-release
# automation on this repo.
on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-release.yml"
  workflow_dispatch:

jobs:
  test:
    name: "Android — Unit Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - run: ./gradlew :app:testDebugUnitTest --no-daemon

  release:
    name: "Android — Signed Release APK"
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `git rev-list --count` gives the commit count
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties
      - name: Derive version
        id: version
        run: |
          BASE=$(sed -n 's/.*VERSION_NAME") ?: "\([0-9]*\.[0-9]*\).*/\1/p' app/build.gradle.kts)
          if [ -z "$BASE" ]; then echo "::error::could not read major.minor from build.gradle.kts"; exit 1; fi
          COMMITS=$(git rev-list --count HEAD)
          CODE=$(( $(date +%s) / 60 ))
          echo "name=$BASE.$COMMITS" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Releasing $BASE.$COMMITS (versionCode $CODE)"
      - name: Build signed release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.HAWKSNEST_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.HAWKSNEST_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.HAWKSNEST_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.HAWKSNEST_KEY_PASSWORD }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            export KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
            echo "Signing with the CI release key."
          else
            echo "No HAWKSNEST_KEYSTORE_BASE64 secret; signing with the committed stable key."
          fi
          ./gradlew :app:assembleRelease --no-daemon
      - name: Stage APK + version.json for Dragonfly
        run: |
          APK=hawksnest-${{ steps.version.outputs.name }}.apk
          cp app/build/outputs/apk/release/app-release.apk "$APK"
          SHA256=$(sha256sum "$APK" | cut -d' ' -f1)
          printf '{"versionCode": %d, "versionName": "%s", "sha256": "%s", "minSdk": 26}\n' \
            "${{ steps.version.outputs.code }}" "${{ steps.version.outputs.name }}" "$SHA256" > version.json
          cat version.json
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ steps.version.outputs.name }}
          name: "Android ${{ steps.version.outputs.name }}"
          generate_release_notes: true
          files: |
            android/hawksnest-${{ steps.version.outputs.name }}.apk
            android/version.json
