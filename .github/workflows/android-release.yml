name: Android Release

# Manual trigger — build a signed release APK for sideloading.
#
# It is signed with the ONE committed key in android/app/build.gradle.kts (the same key every debug
# and CI build uses), NOT a separate secret key. That is deliberate: a different key would sign this
# APK with a different certificate than the build already on the phone, and Android would reject the
# install as "App not installed as package conflicts with an existing package". Sharing one key is
# what lets each release.apk install in place over the previous one. No signing secrets are needed.
#
# Triggers: the manual "Run workflow" button (once this file is on the default branch), and a push
# that changes this workflow or the `android/.release-trigger` sentinel. To cut a new signed build,
# bump `android/.release-trigger` and push.
on:
  workflow_dispatch:
  push:
    branches: ["claude/**", "main"]
    paths:
      - ".github/workflows/android-release.yml"
      - "android/.release-trigger"

jobs:
  release:
    name: "Android — Signed Release APK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4

      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Assemble signed release APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "0.1.${{ github.run_number }}"
        run: ./gradlew :app:assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: hawksnest-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
