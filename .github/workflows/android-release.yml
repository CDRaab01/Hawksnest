name: Android Release

# Manual trigger — build a SIGNED release APK with your own key.
# Requires four repository secrets (Settings → Secrets and variables → Actions):
#   HAWKSNEST_KEYSTORE_BASE64    base64 of your release keystore (.jks)
#   HAWKSNEST_KEYSTORE_PASSWORD  the keystore (store) password
#   HAWKSNEST_KEY_ALIAS          the key alias
#   HAWKSNEST_KEY_PASSWORD       the key password
# The signed APK is uploaded as an artifact and installs as an update over previous signed builds.
#
# Triggers: the manual "Run workflow" button (once this file is on the default branch), and a push
# that changes this workflow or the `android/.release-trigger` sentinel. To cut a new signed build,
# bump `android/.release-trigger` and push.
on:
  workflow_dispatch:
  push:
    branches: ["claude/**", "main"]
    paths:
      - ".github/workflows/android-release.yml"
      - "android/.release-trigger"

jobs:
  release:
    name: "Android — Signed Release APK"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.HAWKSNEST_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::HAWKSNEST_KEYSTORE_BASE64 secret is not set. Add the four signing secrets first."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Assemble signed release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.HAWKSNEST_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.HAWKSNEST_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.HAWKSNEST_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: "0.1.${{ github.run_number }}"
        run: ./gradlew :app:assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: hawksnest-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
