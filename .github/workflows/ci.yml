name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    # Playwright end-to-end: demo-mode UI flows + the live haSource path driven
    # against the bundled mock HA server (mock-ha/). Advisory while flake is shaken
    # out; the mock's own protocol logic is unit-tested in the gating `build` job.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      # Cache the managed Chromium (GitHub runners have no /opt/pw-browsers).
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - run: npx playwright install --with-deps chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        if: steps.pw-cache.outputs.cache-hit == 'true'

      - run: npm run test:e2e
        env:
          CI: "true"

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7

  manifests:
    # Schema-validate the k8s deploy manifests so a bad edit fails CI rather than
    # the rollout. (The vitest deploy.test.ts already asserts the nginx/Dockerfile
    # contract; this adds real Kubernetes schema validation.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize + kubeconform
        # Pinned, direct release-asset downloads (no upstream install_kustomize.sh
        # / "latest" lookups — those hit GitHub's unauthenticated API rate limit
        # and flake the job, e.g. "kustomize_v*_linux_amd64.tar.gz: Cannot open").
        # curl --retry adds resilience to transient download hiccups.
        env:
          KUSTOMIZE_VERSION: v5.4.3
          KUBECONFORM_VERSION: v0.6.7
        run: |
          set -euo pipefail
          curl --retry 3 --retry-delay 2 --retry-all-errors -fsSL \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" \
            | tar xz kustomize
          sudo mv kustomize /usr/local/bin/
          curl --retry 3 --retry-delay 2 --retry-all-errors -fsSL \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz kubeconform
          sudo mv kubeconform /usr/local/bin/
          kustomize version
          kubeconform -v

      - name: Build manifests
        run: kustomize build deploy/k8s | tee /tmp/hawksnest.yaml

      - name: Validate against Kubernetes schemas
        run: kubeconform -strict -summary -ignore-missing-schemas /tmp/hawksnest.yaml
