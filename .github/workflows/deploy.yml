name: Deploy

# Builds the Hawksnest image on the self-hosted runner inside the Dragonfly WSL2
# distro, imports it into K3s containerd, and applies the manifests. No registry.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "deploy/**"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy.yml"
      - "index.html"
      - "public/**"
      - "vite.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "tsconfig*.json"

jobs:
  deploy:
    runs-on: [self-hosted, linux, dragonfly]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t hawksnest:local .

      - name: Import image into K3s containerd
        run: docker save hawksnest:local | sudo k3s ctr -n k8s.io images import -

      # Use k3s's bundled kubectl via sudo so it reads the root-owned kubeconfig
      # at /etc/rancher/k3s/k3s.yaml. A plain `kubectl` relies on that file being
      # world-readable, which it isn't after k3s (re)starts — it recreates the
      # file as mode 600, so a host reboot breaks the deploy with "k3s.yaml:
      # permission denied". sudo is already used (passwordless) for `k3s ctr`.
      - name: Apply manifests
        run: sudo k3s kubectl apply -k deploy/k8s

      # Image tag is fixed (hawksnest:local), so apply alone won't roll the pod —
      # restart to pick up the freshly imported image.
      - name: Roll to the new image
        run: sudo k3s kubectl -n home-automation rollout restart deployment/hawksnest

      - name: Wait for rollout
        run: sudo k3s kubectl -n home-automation rollout status deployment/hawksnest --timeout=120s
