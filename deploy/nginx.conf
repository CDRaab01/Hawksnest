# Hawksnest pod: serve the SPA and reverse-proxy the HA API so the browser only
# ever talks to this one origin (no CORS, no mixed content). HA is reached via
# its in-cluster Service DNS — no NodePort/portproxy hop needed for the proxy.
upstream homeassistant {
    server home-assistant.home-automation.svc.cluster.local:8123;
}

# Map the Upgrade header so the /go2rtc/ location can serve both go2rtc's
# WebSocket signaling (/go2rtc/api/ws, used for two-way audio) and its plain
# HTTP endpoints (/go2rtc/api/streams) from one block.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HA WebSocket API — must upgrade the connection and stay open.
    location /api/websocket {
        proxy_pass http://homeassistant;
        # Clear any inbound X-Forwarded-* so HA (use_x_forwarded_for) never sees an
        # untrusted proxy header and 400s the request — the TLS front (Tailscale Serve)
        # injects XFF, and nginx would otherwise pass it through. See the block comment.
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # IMPORTANT: every HA-proxied location EXPLICITLY CLEARS X-Forwarded-For /
    # X-Forwarded-Proto (proxy_set_header ... "") before proxying. HA has
    # `use_x_forwarded_for` enabled and 400s ("Received X-Forwarded-For header from
    # an untrusted proxy") any request carrying an XFF from a proxy not in
    # `trusted_proxies` (this pod isn't). It was enough to just *not add* XFF while
    # Hawksnest was reached via a plain portproxy — but the TLS front (Tailscale
    # Serve, https://<host>.ts.net:8443) injects XFF, and nginx passes inbound
    # headers through by default, so we must actively strip it here or HA 400s every
    # /api call (camera frames included). Auth is by token, so HA logging the pod IP
    # costs nothing. Alternative: add the K3s pod CIDR to HA's `trusted_proxies`.

    # HA MJPEG camera live stream (multipart/x-mixed-replace). Buffering MUST be
    # off or nginx stalls the never-ending multipart body and the live view never
    # paints. Long read timeout keeps the stream open while the lightbox is up.
    location /api/camera_proxy_stream/ {
        proxy_pass http://homeassistant;
        # Clear any inbound X-Forwarded-* so HA (use_x_forwarded_for) never sees an
        # untrusted proxy header and 400s the request — the TLS front (Tailscale Serve)
        # injects XFF, and nginx would otherwise pass it through. See the block comment.
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # HA HLS camera streams (go2rtc/`camera/stream`) — `/api/hls/<token>/master.m3u8`
    # plus its segments. Like the MJPEG stream, buffering MUST be off (the playlist
    # and segments are served as a live stream) and the read timeout long. Same XFF
    # omission as everything else, or HA 400s the GETs.
    location /api/hls/ {
        proxy_pass http://homeassistant;
        # Clear any inbound X-Forwarded-* so HA (use_x_forwarded_for) never sees an
        # untrusted proxy header and 400s the request — the TLS front (Tailscale Serve)
        # injects XFF, and nginx would otherwise pass it through. See the block comment.
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Frigate NVR (via the Frigate HA integration's views) — recorded-event clips,
    # snapshots, and the VOD HLS playlists that back the timeline scrubber. Buffering
    # off so the m3u8/clip streams don't stall; long read timeout for long clips.
    # (No Frigate yet — this is ready for when it joins the cluster.)
    location /api/frigate/ {
        proxy_pass http://homeassistant;
        # Clear any inbound X-Forwarded-* so HA (use_x_forwarded_for) never sees an
        # untrusted proxy header and 400s the request — the TLS front (Tailscale Serve)
        # injects XFF, and nginx would otherwise pass it through. See the block comment.
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # HA REST API (history, camera snapshots, logbook, etc.).
    location /api/ {
        proxy_pass http://homeassistant;
        # Clear any inbound X-Forwarded-* so HA (use_x_forwarded_for) never sees an
        # untrusted proxy header and 400s the request — the TLS front (Tailscale Serve)
        # injects XFF, and nginx would otherwise pass it through. See the block comment.
        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Forwarded-Proto "";
        proxy_set_header Host $host;
    }

    # go2rtc (embedded in ring-mqtt) — WebRTC *signaling* only, for two-way audio
    # ("talk"). The app POSTs an SDP offer to `/go2rtc/api/webrtc?src=<stream>` and
    # lists streams via `/go2rtc/api/streams`; go2rtc answers and routes mic audio
    # to the Ring back-channel. Same-origin like the HA proxy above, so the talk
    # feature reaches go2rtc without a new external surface — this is reachable only
    # wherever the app already is (LAN / Tailscale).
    #
    # NOTE: this proxies *signaling* only. The WebRTC *media* is a separate UDP/TCP
    # flow on go2rtc's :8555 that does NOT traverse nginx — it must be reachable
    # from the client (and go2rtc must advertise a reachable ICE candidate). See
    # the talk/two-way-audio section in hawksnest-automation for that exposure step.
    # Two-way audio ("talk") negotiates over go2rtc's WebSocket API
    # (/go2rtc/api/ws?src=<stream>), with /go2rtc/api/streams discovered over plain
    # HTTP — the map above lets one block do both. Points at the DEDICATED go2rtc
    # (native ring: source, two-way capable), NOT ring-mqtt's (one-way). Buffering
    # off + long read timeout keep the WS open. Signaling only — the WebRTC media
    # rides go2rtc's :8555 (host hostPort), which does not traverse nginx.
    location /go2rtc/ {
        proxy_pass http://go2rtc.home-automation.svc.cluster.local:1984/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # PWA service worker + manifest must never be cached by the browser, so a
    # new build is picked up immediately (Workbox versions the precache itself).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
