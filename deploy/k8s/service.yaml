apiVersion: v1
kind: Service
metadata:
  name: hawksnest
  labels:
    app: hawksnest
spec:
  type: NodePort
  selector:
    app: hawksnest
  ports:
    - name: http
      port: 80
      targetPort: http
      # Mirrors HA's 30123 convention; the Windows portproxy maps 8080 → 30080.
      nodePort: 30080
