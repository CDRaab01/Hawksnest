apiVersion: apps/v1
kind: Deployment
metadata:
  name: hawksnest
  labels:
    app: hawksnest
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hawksnest
  template:
    metadata:
      labels:
        app: hawksnest
    spec:
      containers:
        - name: hawksnest
          # Built + imported into K3s containerd by the deploy workflow.
          image: hawksnest:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
